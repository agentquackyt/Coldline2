<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coldline Vol. 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+80s+Fade&family=Workbench&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style/index.css">
    <link rel="shortcut icon" href="./images/telephone.png" type="image/png">
</head>

<body>
    <section class="intro">
        <div>
            <h1>Coldline</h1>
            <h2>Volume 2</h2>
        </div>
        <div class="button-group">
            <button id="start-button">Start Game</button>
            <a href="https://flavortown.hackclub.com/projects/13971" class="flavortown-link" target="_blank" rel="noopener noreferrer">Flavortown</a>
        </div>
    </section>
    <section class="game-over hidden">
        <div>
            <h1>You failed!</h1>
            <h2>You were too slow!</h2>
        </div>
        <button class="start-button">Restart Game</button>
    </section>
    <section class="game-loading hidden">
        <div>
            <h1>Please wait</h1>
            <h2>Loading audio assets...</h2>
            <p id="loading-progress">Loading ...</p>
        </div>
    </section>
    <section class="game-won hidden">
        <div>
            <h1>You won!</h1>
            <h2>Time remaining: <span id="win-time">--:--</span></h2>
        </div>
        <button class="start-button">Play Again</button>
    </section>
    <main id="game-container" class="hidden">

    </main>
    <script src="./ts/entry.ts"></script>
</body>

</html>
